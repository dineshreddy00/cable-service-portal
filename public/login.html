<!DOCTYPE html>
<html>
<head>
  <title>Login - Cable Service</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="form-section login-box">
  <h2>Login with Mobile Number</h2>
  <p>Enter your mobile number to continue</p>

  <input id="mobile" placeholder="Enter 10 digit mobile number">
  <button onclick="login()">Login</button>

  <p id="msg"></p>
</section>

<script>
function login() {
  const mobile = document.getElementById("mobile").value;

  if (mobile.length !== 10 || isNaN(mobile)) {
    document.getElementById("msg").innerText = "Enter valid 10 digit mobile number";
    return;
  }

  localStorage.setItem("mobile", mobile);
  window.location.href = "index.html";
}
</script>

</body>
</html>
